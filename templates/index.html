<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cat vs Dog Detection</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background: linear-gradient(to right, #f5f7fa, #c3cfe2);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Georgia', 'Times New Roman', serif;
        }

        .card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            animation: fadeIn 1s ease-in-out;
        }

        .title {
            color: #2c3e50;
            letter-spacing: 1px;
        }

        .btn-classic {
            background: #2c3e50;
            color: white;
            transition: all 0.3s ease;
        }

        .btn-classic:hover {
            background: #34495e;
            transform: scale(1.05);
        }

        .result-box {
            border-top: 2px solid #e0e0e0;
            padding-top: 20px;
            margin-top: 20px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .image-style {
            border-radius: 15px;
            border: 3px solid #2c3e50;
            box-shadow: 0 8px 18px rgba(0,0,0,0.2);
        }
    </style>
</head>

<body>

<div class="card p-10 w-full max-w-xl text-center">

    <h1 class="text-4xl font-bold title mb-3">
        🐶 Cat vs Dog Detection 🐱
    </h1>

    <p class="text-gray-600 mb-6 text-lg">
        Classic Machine Learning Image Classifier
    </p>

    <form action="/predict" method="POST"  class="space-y-5">

        <input 
            type="file" 
            name="file" 
            required
            class="block w-full text-sm text-gray-700 border border-gray-400 rounded-lg p-2 cursor-pointer bg-gray-100"
        >

        <button 
            type="submit"
            class="btn-classic px-8 py-3 rounded-lg font-semibold text-lg"
        >
            Detect Animal
        </button>

    </form>

    {% if result_image %}

    <div class="result-box">

        <h2 class="text-2xl font-semibold text-green-700 mb-4">
            Prediction: {{ label }}
        </h2>

        <img 
            src="{{ url_for('uploaded_file', filename=result_image) }}"
            width="420"
            class="mx-auto image-style"
        >

    </div>

    {% endif %}

</div>

</body>
</html>
